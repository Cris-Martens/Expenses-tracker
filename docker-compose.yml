services:
  mysql:
    container_name: mysql
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: tytRib-myksy7-rupmog
      MYSQL_DATABASE: budget
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "-uapp_user", "-papp_password"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mysql_data: